<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Teko&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="assets/css/main.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <title>v42 - Loadingscreen</title>
</head>

<body>
    <video id="bg-video" autoplay loop muted>
        <source id="bg-video-source" src="" type="video/mp4">
    </video>

    <div class="gradient-overlay"></div>

    <div class="load-wrap">
        <div class="d-flex justify-content-between align-items-center">
            <div class="w-100 mb-5">
                <div style="display: flex; justify-content: center;">
                    <div class="devider1"></div>
                    <div class="devider2"></div>
                </div>
            </div>
        </div>

        <div class="content-width">

            <div class="main-row">
                <div id="left-card" class="discord-col"></div>

                <div class="logo-col">
                    <div class="logo-img d-flex flex-column align-items-center">
                        <div class="image-container">
                            <img id="rotating-image" src="" alt="">
                        </div>
                        <div style="margin-top: 11%;">
                            <h1 id="welcome-title"></h1>
                        </div>
                    </div>
                </div>

                <div id="right-card" class="discord-col"></div>
            </div>

            <div class="audio-player mt-5">
                <audio id="audio" preload="auto"></audio>
                <div class="d-flex" style="padding: 0.5rem;">
                    <div class="control-icon" style="border: 1px solid; border-color: var(--accent);">
                        <i class="fa-solid fa-music"></i>
                    </div>
                    <div id="skip-back" class="control-icon ml-1"
                        style="border: 1px solid; border-color:var(--accent);">
                        <i class="fa-solid fa-backward-step"></i>
                    </div>
                    <div id="play-pause" class="control-icon" style="border: 1px solid; border-color:  var(--accent);">
                        <i class="fa-solid fa-play"></i>
                    </div>
                    <div id="skip-forward" class="control-icon"
                        style="border: 1px solid; border-color:  var(--accent);">
                        <i class="fa-solid fa-forward-step"></i>
                    </div>
                    <div class="control-volume">
                        <i class="fa-solid fa-volume-low"></i>
                        <input id="volume" type="range" min="0" max="1" step="0.01" value="0.2">
                        <i class="fa-solid fa-volume-high"></i>
                    </div>
                    <div class="w-100 d-flex align-items-center flex-column" style="margin: 0 1rem;">
                        <div class="d-flex justify-content-between w-100">
                            <div>
                                <span id="title"></span>
                            </div>
                            <div>
                                <span id="time">00:00</span>
                            </div>
                        </div>
                        <div class="progress-bar">
                            <div id="progress"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>


        <div class="row mt-5" id="partners-row"></div>
        <div>
        </div>

        <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
        <script src="assets/js/config.js"></script>
        <script src="assets/js/main.js"></script>
</body>

</html>
